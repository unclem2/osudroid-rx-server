{% extends "base.html" %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl mx-auto mb-4 flex items-center justify-center" style="background:rgba(93,142,240,0.15)">
        <i class="fas fa-lock text-xl" style="color:#5b8ef0"></i>
      </div>
      <h1 class="text-2xl font-bold">Change Password</h1>
    </div>

    <div class="rounded-2xl p-6 shadow-2xl" style="background:#1e2535;border:1px solid rgba(93,142,240,0.2)">
      <form method="post" class="space-y-4">
        <div>
          <label for="old_password" class="block text-sm font-medium mb-1.5" style="color:rgba(221,226,236,0.8)">Current Password</label>
          <input type="password" id="old_password" name="old_password" placeholder="Current password" required
                 class="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition-colors"
                 style="background:#161c27;border:1px solid rgba(93,142,240,0.2);color:#dde2ec;caret-color:#5b8ef0"
                 onfocus="this.style.borderColor='#5b8ef0'" onblur="this.style.borderColor='rgba(93,142,240,0.2)'">
        </div>
        <div>
          <label for="new_password" class="block text-sm font-medium mb-1.5" style="color:rgba(221,226,236,0.8)">New Password</label>
          <input type="password" id="new_password" name="new_password" placeholder="At least 6 characters" required minlength="6"
                 class="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition-colors"
                 style="background:#161c27;border:1px solid rgba(93,142,240,0.2);color:#dde2ec;caret-color:#5b8ef0"
                 onfocus="this.style.borderColor='#5b8ef0'" onblur="this.style.borderColor='rgba(93,142,240,0.2)'">
        </div>
        <div>
          <label for="confirm_password" class="block text-sm font-medium mb-1.5" style="color:rgba(221,226,236,0.8)">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat new password" required minlength="6"
                 class="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition-colors"
                 style="background:#161c27;border:1px solid rgba(93,142,240,0.2);color:#dde2ec;caret-color:#5b8ef0"
                 onfocus="this.style.borderColor='#5b8ef0'" onblur="this.style.borderColor='rgba(93,142,240,0.2)'">
        </div>
        <button type="submit" class="w-full py-2.5 rounded-xl text-sm font-semibold transition-opacity hover:opacity-90 mt-2"
                style="background:#5b8ef0;color:#fff">
          Update Password
        </button>
      </form>
    </div>

  </div>
</div>
{% endblock %}
