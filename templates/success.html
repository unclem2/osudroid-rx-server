{% extends "base.html" %}

{% block title %}Success{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md text-center">
    <div class="w-16 h-16 rounded-2xl mx-auto mb-5 flex items-center justify-center" style="background:rgba(74,222,128,0.1)">
      <i class="fas fa-check-circle text-2xl" style="color:#4ade80"></i>
    </div>
    <h1 class="text-2xl font-bold mb-2">Done!</h1>
    {% if success_message %}
    <p class="text-sm mb-6" style="color:rgba(221,226,236,0.6)">{{ success_message }}</p>
    {% endif %}
    <div class="flex flex-wrap justify-center gap-3 mt-2">
      <a href="/" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl text-sm font-medium transition-opacity hover:opacity-90"
         style="background:#1e2535;color:#dde2ec;border:1px solid rgba(93,142,240,0.2)">
        <i class="fas fa-home"></i>Home
      </a>
    </div>
  </div>
</div>
{% endblock %}
