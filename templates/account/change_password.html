<div class="flex items-start gap-4">
  <div class="w-9 h-9 rounded-xl flex-shrink-0 flex items-center justify-center" style="background:rgba(93,142,240,0.1)">
    <i class="fas fa-lock text-sm" style="color:#5b8ef0"></i>
  </div>
  <div class="flex-1">
    <h3 class="font-semibold text-sm mb-0.5">Change Password</h3>
    <p class="text-xs mb-3" style="color:rgba(221,226,236,0.45)">Choose a strong password of at least 6 characters.</p>
    <form method="post" action="{{ url_for('user_change_password.change_password') }}" class="space-y-3 max-w-sm">
      <input type="password" name="old_password" placeholder="Current password" required
             class="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition-colors"
             style="background:#161c27;border:1px solid rgba(93,142,240,0.2);color:#dde2ec;caret-color:#5b8ef0"
             onfocus="this.style.borderColor='#5b8ef0'" onblur="this.style.borderColor='rgba(93,142,240,0.2)'">
      <input type="password" name="new_password" placeholder="New password" required minlength="6"
             class="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition-colors"
             style="background:#161c27;border:1px solid rgba(93,142,240,0.2);color:#dde2ec;caret-color:#5b8ef0"
             onfocus="this.style.borderColor='#5b8ef0'" onblur="this.style.borderColor='rgba(93,142,240,0.2)'">
      <input type="password" name="confirm_password" placeholder="Confirm new password" required minlength="6"
             class="w-full px-4 py-2.5 rounded-xl text-sm outline-none transition-colors"
             style="background:#161c27;border:1px solid rgba(93,142,240,0.2);color:#dde2ec;caret-color:#5b8ef0"
             onfocus="this.style.borderColor='#5b8ef0'" onblur="this.style.borderColor='rgba(93,142,240,0.2)'">
      <button type="submit" class="px-4 py-2 rounded-xl text-sm font-medium transition-opacity hover:opacity-90"
              style="background:#5b8ef0;color:#fff">
        Update Password
      </button>
    </form>
  </div>
</div>
